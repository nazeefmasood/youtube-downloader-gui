name: Build

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            build_cmd: build:linux
          - os: macos-latest
            platform: mac
            build_cmd: build:mac
          - os: windows-latest
            platform: win
            build_cmd: build:win

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run ${{ matrix.build_cmd }} -- --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload Linux artifacts
        if: matrix.platform == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: vidgrab-linux
          path: release/*.deb
          retention-days: 7

      - name: Upload macOS artifacts
        if: matrix.platform == 'mac'
        uses: actions/upload-artifact@v4
        with:
          name: vidgrab-mac
          path: release/*.zip
          retention-days: 7

      - name: Upload Windows artifacts
        if: matrix.platform == 'win'
        uses: actions/upload-artifact@v4
        with:
          name: vidgrab-win
          path: release/*.exe
          retention-days: 7

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release files
        run: |
          mkdir -p release
          find artifacts -type f \( -name "*.exe" -o -name "*.deb" -o -name "*.zip" -o -name "*.AppImage" \) -exec cp {} release/ \;
          ls -la release/

      - name: Extract Changelog
        id: changelog
        run: |
          VERSION=${{ github.ref_name }}
          VERSION_NUM=$(echo $VERSION | sed 's/v//')

          if [ -f "CHANGELOG.md" ]; then
            CHANGELOG=$(sed -n "/## \[$VERSION_NUM\]/,/## \[/p" CHANGELOG.md | head -n -1 | tail -n +2)
            if [ -z "$CHANGELOG" ]; then
              CHANGELOG="Release $VERSION"
            fi
          else
            CHANGELOG="Release $VERSION"
          fi

          echo "# VidGrab ${VERSION}" > changelog.txt
          echo "" >> changelog.txt
          echo "$CHANGELOG" >> changelog.txt

      - name: Create Release (Private Repo)
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          body_path: changelog.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release (Public Repo)
        uses: softprops/action-gh-release@v2
        with:
          repository: nazeefmasood/grab-releases
          tag_name: ${{ github.ref_name }}
          name: VidGrab ${{ github.ref_name }}
          files: release/*
          body_path: changelog.txt
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_REPO_TOKEN }}
